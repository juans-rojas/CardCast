<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>CardCast - Professional Broadcast Pokémon TCG Match Overlay</title>
    <!-- Google Fonts for premium esports look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Base Reset & Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Outfit', sans-serif;
            color: #f8fafc;
            overflow: hidden;
            position: relative;
        }

        /* Section I: Universal Card Artwork Crop Rule (aspect-ratio 12:7) */
        .cropped-card-art {
            position: relative;
            overflow: hidden;
            aspect-ratio: 12 / 7;
            border-radius: 4px;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            background-color: #050b18;
        }
        .cropped-card-art img {
            position: absolute;
            width: 119.05%;  /* 100% / 0.84 (width crop is 8% to 92%) */
            height: 285.71%; /* 100% / 0.35 (height crop is 11% to 46%) */
            left: -9.52%;    /* -8% / 0.84 */
            top: -31.43%;    /* -11% / 0.35 */
            object-fit: fill;
        }

        /* Playmat background placeholder centered in the 16:9 game area */
        .playmat-placeholder {
            position: absolute;
            left: 320px;
            top: 120px;
            width: 1280px;
            height: 720px;
            background-color: #0b1329;
            background-image: 
                radial-gradient(circle, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.04);
            box-sizing: border-box;
        }
        .playmat-circles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .playmat-center-circle {
            width: 280px;
            height: 280px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            position: relative;
        }
        .playmat-center-circle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255, 255, 255, 0.07);
            border-radius: 50%;
        }
        .playmat-text {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 26px;
            letter-spacing: 0.25em;
            color: rgba(255, 255, 255, 0.12);
            z-index: 2;
        }

        /* Solid Esports-Quality Panels (Play! Pokemon Blue Theme) */
        .panel {
            position: absolute;
            top: 0;
            width: 320px;
            height: 1080px;
            background: linear-gradient(180deg, #09183b 0%, #050d1e 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 14px 16px;
            border-bottom: 4px solid #1e40af;
            box-shadow: 8px 0 24px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .panel.left {
            left: 0;
            border-right: 3px solid #1e3a8a;
        }
        .panel.right {
            right: 0;
            border-left: 3px solid #1e3a8a;
        }

        /* Active Player Turn Glow Highlight (Highlighting border only) */
        .panel.left.active-turn {
            border-right: 5px solid #10b981;
            box-shadow: 12px 0 28px rgba(16, 185, 129, 0.25);
        }
        .panel.right.active-turn {
            border-left: 5px solid #ef4444;
            box-shadow: -12px 0 28px rgba(239, 68, 68, 0.25);
        }

        /* Player Header Block styles */
        .player-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
            height: 94px;
        }
        .player-header.mirrored {
            flex-direction: row-reverse;
        }
        .player-info-text {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .player-header.mirrored .player-info-text {
            text-align: right;
            align-items: flex-end;
        }
        .player-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 26px;
            color: #ffffff;
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .player-score {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 19px;
            color: #fbbf24; /* Amber points */
            margin-top: 1px;
        }
        .player-stats-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 3px;
        }
        .player-header.mirrored .player-stats-row {
            flex-direction: row-reverse;
        }
        .player-record {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
        }
        .player-flag {
            width: 18px;
            height: 12px;
            object-fit: cover;
            border-radius: 1px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Prize Pokeballs Vertical Stack (Adjacent side scoring) */
        .prize-pokeballs-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 240px;
            width: 32px;
            padding: 2px 0;
            z-index: 20;
        }
        .panel.left .prize-pokeballs-container {
            right: -45px;
            top: 20px;
        }
        .panel.right .prize-pokeballs-container {
            left: -45px;
            top: 20px;
        }
        .pokeball-icon {
            width: 28px;
            height: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .pokeball-icon.taken {
            opacity: 0.15;
            filter: grayscale(1) contrast(0.5);
            transform: scale(0.85);
        }
        .pokeball-icon.penalty {
            filter: drop-shadow(0 0 5px #ef4444);
            animation: penaltyGlow 2s infinite ease-in-out;
        }
        @keyframes penaltyGlow {
            0%, 100% { filter: drop-shadow(0 0 4px #ef4444); }
            50% { filter: drop-shadow(0 0 10px #ef4444); }
        }

        /* Active Pokemon Display Zone (Critically Compact) */
        .active-zone {
            background: #0b1c45;
            border: 1px solid #1e3a8a;
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .panel.left .active-zone {
            border-left: 3.5px solid #10b981;
        }
        .panel.right .active-zone {
            border-right: 3.5px solid #ef4444;
        }
        .active-top-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .active-artwork-frame {
            width: 120px; /* Cropped landscape image */
            flex-shrink: 0;
        }
        .active-text-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
            min-w: 0;
        }
        .active-pokemon-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .active-hp-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 700;
            color: #cbd5e1;
            margin-top: 2px;
            margin-bottom: 3px;
        }
        .hp-bar-outer {
            width: 100%;
            height: 5px;
            background: rgba(0,0,0,0.6);
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .hp-bar-inner {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            transition: width 0.3s ease;
        }
        .hp-bar-inner.low {
            background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 100%);
        }
        .hp-bar-inner.critical {
            background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%);
        }

        /* Detail Attacks & Energies Grid Row */
        .active-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 4px;
        }
        .active-attacks-list {
            display: flex;
            flex-direction: column;
            gap: 2.5px;
            flex: 1;
            min-w: 0;
        }
        .active-attack-item {
            font-size: 10.5px;
            color: #e2e8f0;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .active-attack-item.ability {
            color: #f59e0b;
            font-weight: 700;
        }
        .active-attack-item.attack {
            color: #60a5fa;
        }

        .active-badge-row {
            display: flex;
            align-items: center;
            gap: 3px;
            flex-wrap: wrap;
            max-width: 110px;
            justify-content: flex-end;
            flex-shrink: 0;
        }
        .energy-circle {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.4);
            border: 1px solid rgba(0,0,0,0.15);
        }
        .energy-icon-char {
            font-family: 'EssentiarumTCG', sans-serif;
            font-size: 10.5px;
            line-height: 1;
        }
        .tool-badge {
            background: rgba(6, 78, 59, 0.9);
            border: 1px solid rgba(52, 211, 153, 0.25);
            color: #34d399;
            font-size: 8px;
            font-weight: 700;
            padding: 0px 3px;
            border-radius: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60px;
        }

        /* Benched Zone (Expanded 8 slots vertical stack) */
        .bench-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .bench-slot {
            height: 72px; /* Fixed height for benched slots */
            background: #081534;
            border: 1.5px solid #1e3a8a;
            border-radius: 5px;
            display: flex;
            align-items: center;
            overflow: hidden;
            padding: 0 8px;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .bench-slot.empty {
            border: 1px dashed rgba(255, 255, 255, 0.08);
            background: rgba(8, 15, 36, 0.3);
            justify-content: center;
        }
        .bench-empty-text {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 2.5px;
            color: rgba(255, 255, 255, 0.16);
            text-transform: uppercase;
        }
        .bench-art-thumb {
            width: 110px; /* Cropped landscape thumbnail */
            flex-shrink: 0;
        }
        .bench-slot-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
            min-w: 0;
            gap: 2px;
        }
        .bench-name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bench-pokemon-name {
            font-weight: 700;
            font-size: 12px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }
        .bench-pokemon-hp {
            font-size: 10.5px;
            color: #94a3b8;
            font-weight: 700;
        }
        .bench-abilities-summary {
            font-size: 9.5px;
            color: #38bdf8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.9;
        }

        /* Turn Action Badges (Controls) */
        .status-indicators {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: auto;
            padding-top: 4px;
            flex-shrink: 0;
        }
        .status-badge {
            flex: 1;
            height: 28px;
            background: #081534;
            border: 1.5px solid #1e3a8a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        .panel.left .status-badge.active {
            color: #10b981;
            background: rgba(16, 185, 129, 0.12);
            border-color: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
            text-shadow: 0 0 4px rgba(16, 185, 129, 0.4);
        }
        .panel.right .status-badge.active {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.12);
            border-color: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
            text-shadow: 0 0 4px rgba(239, 68, 68, 0.4);
        }

        /* Section II: Top-Center Element (Stadium Zone) */
        .stadium-zone {
            position: absolute;
            top: 0;
            left: 320px;
            width: 1280px;
            height: 120px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .stadium-holder {
            width: 360px;
            height: 90px;
            background: linear-gradient(180deg, #09183b 0%, #050d1e 100%);
            border: 2px solid #1e3a8a;
            border-top: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border-radius: 0 0 10px 10px;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 12px;
            pointer-events: auto;
        }
        .stadium-art-crop {
            width: 120px; /* Cropped landscape Stadium card */
            flex-shrink: 0;
        }
        .stadium-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-w: 0;
            flex: 1;
        }
        .stadium-label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .stadium-name {
            font-weight: 700;
            font-size: 14px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Section VII: Integrated Bottom Ticker and Branding */
        .bottom-ticker-container {
            position: absolute;
            left: 320px;
            bottom: 0;
            width: 1280px;
            height: 120px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 24px;
            pointer-events: none;
        }
        .ticker-bar {
            width: 1160px;
            height: 56px;
            background: linear-gradient(90deg, #09183b 0%, #050d1e 100%);
            border: 2px solid #1e3a8a;
            border-bottom: 4px solid #1d4ed8;
            border-radius: 6px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            pointer-events: auto;
        }
        .ticker-section {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }
        .ticker-section.left {
            justify-content: flex-start;
        }
        .ticker-section.center {
            justify-content: center;
            flex: 0 0 auto;
        }
        .ticker-section.right {
            justify-content: flex-end;
        }
        
        .ticker-branding {
            display: flex;
            flex-direction: column;
        }
        .ticker-event-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 13px;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .ticker-match-state {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Central Digital Timer */
        .timer-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1.5px solid #1e3a8a;
            border-radius: 4px;
            padding: 4px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
        }
        .timer-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 26px;
            font-weight: 700;
            color: #38bdf8;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.3);
        }

        /* Turn Indicator */
        .turn-indicator-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #081534;
            padding: 6px 16px;
            border-radius: 4px;
            border: 1.5px solid #1e3a8a;
            transition: all 0.3s ease;
        }
        .turn-indicator-box.p1-active {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.08);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }
        .turn-indicator-box.p2-active {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.1);
        }
        .turn-indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #475569;
            transition: all 0.3s ease;
        }
        .turn-indicator-box.p1-active .turn-indicator-dot {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        .turn-indicator-box.p2-active .turn-indicator-dot {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }
        .turn-indicator-label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            transition: all 0.3s ease;
        }
        .turn-indicator-box.p1-active .turn-indicator-label {
            color: #10b981;
        }
        .turn-indicator-box.p2-active .turn-indicator-label {
            color: #ef4444;
        }

        /* Visibility transition */
        .overlay-container {
            width: 1920px;
            height: 1080px;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.985);
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .overlay-container.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        
        /* Centered Animations Overlay */
        .animation-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .animation-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .animation-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 800;
            font-size: 96px;
            color: #f59e0b;
            text-shadow: 0 0 30px rgba(245, 158, 11, 0.6);
            letter-spacing: 6px;
            text-transform: uppercase;
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .animation-overlay.active .animation-name {
            transform: scale(1);
        }
        .animation-player-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 42px;
            color: #ffffff;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Evolve Flash Animation */
        .evolve-flash-effect {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.4) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 20;
        }
        .evolve-flash-effect.active {
            animation: flashPulse 1.2s ease forwards;
        }
        @keyframes flashPulse {
            0% { opacity: 0; }
            20% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Central playmat viewport placeholder -->
    <div class="playmat-placeholder">
        <div class="playmat-circles">
            <div class="playmat-center-circle"></div>
        </div>
        <div class="playmat-text">GAMEPLAY FEED</div>
    </div>

    <!-- Main Overlay Container -->
    <div class="overlay-container" id="overlayContainer">

        <!-- Section II: Top-Center Element (Stadium Zone) -->
        <div class="stadium-zone">
            <div class="stadium-holder" id="stadiumHolder">
                <div class="cropped-card-art stadium-art-crop">
                    <img id="stadiumImage" src="" alt="Stadium" onerror="this.src='/images/card-back.png'">
                </div>
                <div class="stadium-details">
                    <span class="stadium-label">STADIUM</span>
                    <span class="stadium-name" id="stadiumName">NO ACTIVE STADIUM</span>
                </div>
            </div>
        </div>

        <!-- Player 1 (Left Column) -->
        <div class="panel left" id="player1Board">

            <div class="player-header">

            <!-- Section III: Player Header Block (Mirrored) -->
            <div class="player-header mirrored">
                <div class="player-info-text">
                    <div class="player-name" id="player2Name">Player 2</div>

                    <div class="player-stats-row">
                        <div class="player-record" id="player2Record">0-0-0</div>
                        <img class="player-flag" id="player2Flag" src="https://flagcdn.com/us.svg" alt="US">
                    </div>
                </div>
            </div>

            <!-- Section IV: Active Pokemon Display -->
            <div class="active-zone">
                <div class="evolve-flash-effect" id="player2ActiveFlash"></div>
                <div class="active-top-row">
                    <div class="cropped-card-art active-artwork-frame">
                        <img id="player2ActiveImage" src="" alt="Active Pokemon" onerror="this.src='/images/card-back.png'">
                    </div>
                    <div class="active-text-details">
                        <div class="active-pokemon-name" id="player2ActiveName">NO ACTIVE</div>
                        <div class="active-hp-row">
                            <span>HP</span>
                            <span id="player2ActiveHpText">0 / 0</span>
                        </div>
                        <div class="hp-bar-outer">
                            <div class="hp-bar-inner" id="player2ActiveHpFill"></div>
                        </div>
                    </div>
                </div>
                <div class="active-bottom-row">
                    <div class="active-attacks-list" id="player2ActiveAttacks">
                        <!-- Ability / Attacks list summaries -->
                    </div>
                    <!-- Attached energy / tools display -->
                    <div class="active-badge-row" id="player2ActiveBadges">
                        <!-- Energies + Tools -->
                    </div>
                </div>

            <!-- Section V: Benched Zone (exactly 8 slots) -->
            <div class="bench-zone" id="player2Bench">
                <!-- 8 slots rendered dynamically -->
            </div>

            <!-- Section VI: Turn Action Badges -->
            <div class="status-indicators">
                <div class="status-badge" id="player2EnergyAction">Energy</div>
                <div class="status-badge" id="player2SupporterAction">Supporter</div>
                <div class="status-badge" id="player2RetreatAction">Retreat</div>
            </div>
        </div>

        <!-- Section VII: Integrated Bottom Ticker and Branding -->
        <div class="bottom-ticker-container">
            <div class="ticker-bar">
                <div class="ticker-section left">
                    <div class="ticker-branding">
                        <span class="ticker-event-name">PLAY! CARDCAST CHAMPIONSHIP</span>
                        <span class="ticker-match-state" id="tickerMatchState">BEST OF 3 • GAME 1</span>
                    </div>
                </div>
                <div class="ticker-section center">
                    <div class="timer-box">
                        <span class="timer-text" id="tickerTimer">50:00</span>
                    </div>
                </div>
                <div class="ticker-section right">
                    <div class="turn-indicator-box" id="turnIndicatorBox">
                        <div class="turn-indicator-dot"></div>
                        <span class="turn-indicator-label" id="turnIndicatorLabel">PLAYER 1'S TURN</span>
                    </div>
                </div>

    </div>

    <!-- Centered Animations Overlay -->
    <div id="animationOverlay" class="animation-overlay">
        <div id="animationName" class="animation-name"></div>
        <div id="animationPlayerName" class="animation-player-name"></div>
    </div>

    <!-- Script Section -->
    <script>
        const socket = io();

        // Match State Cache
        const matchState = {
            player1: {
                name: 'Player 1',
                active: null,
                bench: [],
                benchSize: 5,
                prizes: 6,
                prizesTaken: [],
                record: { wins: 0, losses: 0, ties: 0 },
                matchScore: 0,
                turnActions: { energy: false, supporter: false, retreat: false }
            },
            player2: {
                name: 'Player 2',
                active: null,
                bench: [],
                benchSize: 5,
                prizes: 6,
                prizesTaken: [],
                record: { wins: 0, losses: 0, ties: 0 },
                matchScore: 0,
                turnActions: { energy: false, supporter: false, retreat: false }
            },
            currentTurn: 1,
            timer: { minutes: 50, seconds: 0 },
            timerRunning: false,
            gameNumber: 1,
            matchFormat: 'Best of 3',
            stadium: '',
            visible: false,
            customText: '',
            activeAnimation: null,
            language: 'en'
        };

        let translations = null;

        // Load translations
        async function fetchTranslations() {
            try {
                const response = await fetch('/translations.json');
                translations = await response.json();
                console.log('Broadcast translations loaded:', translations);
            } catch (err) {
                console.error('Failed to load translations:', err);
            }
        }

        function getTrans(key) {
            const lang = matchState.language || 'en';
            if (translations && translations[lang] && translations[lang][key]) {
                return translations[lang][key];
            }
            if (translations && translations['en'] && translations['en'][key]) {
                return translations['en'][key];
            }
            return key;
        }

        function applyTranslations() {
            // Apply static text translation
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const translation = getTrans(key);
                if (translation && translation !== key) {
                    el.innerHTML = translation;
                }
            });
            updateDisplay();
        }

        // Energy Icons Mapping
        function getEnergyIcon(type) {
            const mappings = {
                'Grass': { char: 'G', color: '#10b981' },
                'Fire': { char: 'R', color: '#ef4444' },
                'Water': { char: 'W', color: '#3b82f6' },
                'Lightning': { char: 'L', color: '#f59e0b' },
                'Psychic': { char: 'P', color: '#a855f7' },
                'Fighting': { char: 'F', color: '#b45309' },
                'Darkness': { char: 'D', color: '#475569' },
                'Metal': { char: 'M', color: '#94a3b8' },
                'Dragon': { char: 'N', color: '#d97706' },
                'Colorless': { char: 'C', color: '#64748b' }
            };
            return mappings[type] || { char: 'C', color: '#64748b' };
        }

        // Render Prize Pokeballs Stack
        function renderPrizes(playerNum) {
            const player = matchState[`player${playerNum}`];
            const container = document.getElementById(`player${playerNum}PrizeCards`);
            if (!container) return;

            container.innerHTML = '';
            
            // Generate exactly 6 Pokeballs
            for (let i = 0; i < 6; i++) {
                let svgClass = 'pokeball-icon';
                let topFill = '#ef4444';
                let bottomFill = '#ffffff';
                let centerFill = '#ffffff';
                
                const isPenalty = player.penaltyPrizes && player.penaltyPrizes[i];
                const isTaken = !isPenalty && ((player.prizesTaken && player.prizesTaken.includes(i)) || (i < (6 - player.prizes)));
                
                if (isPenalty) {
                    svgClass = 'pokeball-icon penalty';
                    topFill = '#7f1d1d';
                    bottomFill = '#111827';
                    centerFill = '#ef4444';
                } else if (isTaken) {
                    svgClass = 'pokeball-icon taken';
                }
                
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', '0 0 100 100');
                svg.setAttribute('class', svgClass);
                svg.innerHTML = `
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#000000" stroke-width="8"/>
                    <path d="M 5,50 A 45,45 0 0,1 95,50 Z" fill="${topFill}" stroke="#000000" stroke-width="8"/>
                    <path d="M 5,50 A 45,45 0 0,0 95,50 Z" fill="${bottomFill}" stroke="#000000" stroke-width="8"/>
                    <line x1="5" y1="50" x2="95" y2="50" stroke="#000000" stroke-width="8"/>
                    <circle cx="50" cy="50" r="15" fill="${centerFill}" stroke="#000000" stroke-width="8"/>
                    <circle cx="50" cy="50" r="6" fill="${centerFill}" stroke="#000000" stroke-width="4"/>
                `;
                container.appendChild(svg);
            }
        }

        // Render Active Pokemon display
        function updateActiveDisplay(playerNum) {
            const player = matchState[`player${playerNum}`];
            const nameEl = document.getElementById(`player${playerNum}ActiveName`);
            const imageEl = document.getElementById(`player${playerNum}ActiveImage`);
            const attacksEl = document.getElementById(`player${playerNum}ActiveAttacks`);
            const hpTextEl = document.getElementById(`player${playerNum}ActiveHpText`);
            const hpFillEl = document.getElementById(`player${playerNum}ActiveHpFill`);
            const badgesEl = document.getElementById(`player${playerNum}ActiveBadges`);

            if (player.active) {
                nameEl.textContent = player.active.name.toUpperCase();
                imageEl.src = player.active.image || '/images/card-back.png';
                imageEl.style.display = 'block';

                // Render Attacks & Abilities list
                attacksEl.innerHTML = '';
                
                // Ability
                if (player.active.ability_name) {
                    const item = document.createElement('div');
                    item.className = 'active-attack-item ability';
                    item.textContent = `[Ab] ${player.active.ability_name}`;
                    item.title = player.active.ability_text || '';
                    attacksEl.appendChild(item);
                }
                
                // Attack 1
                if (player.active.attack1_name) {
                    const item = document.createElement('div');
                    item.className = 'active-attack-item attack';
                    const dmg = player.active.attack1_damage ? ` [${player.active.attack1_damage}]` : '';
                    item.textContent = `${player.active.attack1_name}${dmg}`;
                    item.title = player.active.attack1_text || '';
                    attacksEl.appendChild(item);
                }

                // Attack 2
                if (player.active.attack2_name) {
                    const item = document.createElement('div');
                    item.className = 'active-attack-item attack';
                    const dmg = player.active.attack2_damage ? ` [${player.active.attack2_damage}]` : '';
                    item.textContent = `${player.active.attack2_name}${dmg}`;
                    item.title = player.active.attack2_text || '';
                    attacksEl.appendChild(item);
                }

                // HP Bar
                const maxHp = player.active.maxHp || 100;
                const currHp = Math.max(0, player.active.currentHp !== undefined ? player.active.currentHp : maxHp);
                hpTextEl.textContent = `${currHp} / ${maxHp} HP`;
                
                const percent = Math.min(100, Math.max(0, (currHp / maxHp) * 100));
                hpFillEl.style.width = `${percent}%`;
                
                // Colors
                hpFillEl.className = 'hp-bar-inner';
                if (percent <= 20) {
                    hpFillEl.classList.add('critical');
                } else if (percent < 80) {
                    hpFillEl.classList.add('low');
                }

                // Render Energies & Tools Badges
                badgesEl.innerHTML = '';
                
                // Energies
                if (player.active.energies && player.active.energies.length > 0) {
                    player.active.energies.forEach(e => {
                        const { char, color } = getEnergyIcon(e.name);
                        const circle = document.createElement('div');
                        circle.className = 'energy-circle';
                        circle.style.backgroundColor = color;
                        circle.innerHTML = `<span class="energy-icon-char" style="color: ${color === '#e5e7eb' ? '#1e293b' : '#ffffff'}">${char}</span>`;
                        circle.title = e.name;
                        badgesEl.appendChild(circle);
                    });
                }
                
                // Tools
                if (player.active.tools && player.active.tools.length > 0) {
                    player.active.tools.forEach(t => {
                        const badge = document.createElement('div');
                        badge.className = 'tool-badge';
                        badge.textContent = t.name;
                        badge.title = t.name;
                        badgesEl.appendChild(badge);
                    });
                }

            } else {
                nameEl.textContent = getTrans('no-active-pokemon').toUpperCase();
                imageEl.src = '/images/card-back.png';
                attacksEl.innerHTML = '';
                hpTextEl.textContent = '0 / 0';
                hpFillEl.style.width = '0%';
                badgesEl.innerHTML = '';
            }
        }

        // Render Bench Display (Exactly 8 structured slots)
        function updateBenchDisplay(playerNum) {
            const player = matchState[`player${playerNum}`];
            const container = document.getElementById(`player${playerNum}Bench`);
            if (!container) return;

            container.innerHTML = '';

            // Generate exactly 8 slots
            for (let i = 0; i < 8; i++) {
                const slotEl = document.createElement('div');
                
                if (player.bench && player.bench[i]) {
                    const pokemon = player.bench[i];
                    slotEl.className = 'bench-slot';
                    
                    // HP percent calculations
                    const maxHp = pokemon.maxHp || 100;
                    const currHp = Math.max(0, pokemon.currentHp !== undefined ? pokemon.currentHp : maxHp);
                    const percent = Math.min(100, Math.max(0, (currHp / maxHp) * 100));
                    
                    let hpColor = '';
                    if (percent <= 20) hpColor = 'critical';
                    else if (percent < 80) hpColor = 'low';

                    // Summary details of ability or attacks
                    let traitSummary = '';
                    if (pokemon.ability_name) {
                        traitSummary = `[Ab] ${pokemon.ability_name}`;
                    } else if (pokemon.attack1_name) {
                        const dmg = pokemon.attack1_damage ? ` [${pokemon.attack1_damage}]` : '';
                        traitSummary = `${pokemon.attack1_name}${dmg}`;
                    }

                    slotEl.innerHTML = `
                        <div class="cropped-card-art bench-art-thumb">
                            <img src="${pokemon.image || '/images/card-back.png'}" alt="${pokemon.name}">
                        </div>
                        <div class="bench-slot-details">
                            <div class="bench-name-row">
                                <span class="bench-pokemon-name">${pokemon.name}</span>
                                <span class="bench-pokemon-hp">${currHp}/${maxHp}</span>
                            </div>
                            <div class="bench-abilities-summary">${traitSummary}</div>
                            <div class="hp-bar-outer" style="margin-top:2px;">
                                <div class="hp-bar-inner ${hpColor}" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    `;
                } else {
                    slotEl.className = 'bench-slot empty';
                    slotEl.innerHTML = `<span class="bench-empty-text">${getTrans('empty-slot-label')}</span>`;
                }
                container.appendChild(slotEl);
            }
        }

        // Render Stadium Display
        function updateStadiumDisplay() {
            const nameEl = document.getElementById('stadiumName');
            const imageEl = document.getElementById('stadiumImage');
            
            if (matchState.stadium) {
                if (typeof matchState.stadium === 'object') {
                    nameEl.textContent = (matchState.stadium.name || '').toUpperCase();
                    imageEl.src = matchState.stadium.image || '/images/card-back.png';
                } else {
                    nameEl.textContent = matchState.stadium.toUpperCase();
                    imageEl.src = `/cache/images/pokemon/${encodeURIComponent(matchState.stadium)}.png`;
                }
            } else {
                nameEl.textContent = 'NO ACTIVE STADIUM';
                imageEl.src = '/images/card-back.png';
            }
        }

        // Update turn action indicator badges
        function updateTurnActions(playerNum) {
            const actions = matchState[`player${playerNum}`].turnActions;
            const isCurrentTurn = matchState.currentTurn === playerNum;
            
            const energyEl = document.getElementById(`player${playerNum}EnergyAction`);
            const supporterEl = document.getElementById(`player${playerNum}SupporterAction`);
            const retreatEl = document.getElementById(`player${playerNum}RetreatAction`);

            if (energyEl) {
                if (isCurrentTurn && !actions.energy) energyEl.classList.add('active');
                else energyEl.classList.remove('active');
            }
            if (supporterEl) {
                if (isCurrentTurn && !actions.supporter) supporterEl.classList.add('active');
                else supporterEl.classList.remove('active');
            }
            if (retreatEl) {
                if (isCurrentTurn && !actions.retreat) retreatEl.classList.add('active');
                else retreatEl.classList.remove('active');
            }
        }

        // Update timer display
        function updateMatchTimer() {
            const timerEl = document.getElementById('tickerTimer');
            if (!timerEl) return;

            const min = String(matchState.timer.minutes).padStart(2, '0');
            const sec = String(matchState.timer.seconds).padStart(2, '0');
            timerEl.textContent = `${min}:${sec}`;
        }

        // Update overall score & names
        function updatePlayerInfo(playerNum) {
            const nameEl = document.getElementById(`player${playerNum}Name`);
            const scoreEl = document.getElementById(`player${playerNum}Score`);
            const recordEl = document.getElementById(`player${playerNum}Record`);

            const pData = matchState[`player${playerNum}`];
            if (nameEl) nameEl.textContent = pData.name.toUpperCase();
            if (scoreEl) scoreEl.textContent = `SCORE: ${pData.matchScore}`;
            
            if (recordEl) {
                const r = pData.record;
                if (typeof r === 'object') {
                    recordEl.textContent = `${r.wins}-${r.losses}-${r.ties}`;
                } else {
                    recordEl.textContent = r;
                }
            }
        }

        // Render overall layout updates
        function updateDisplay() {
            updatePlayerInfo(1);
            updatePlayerInfo(2);
            renderPrizes(1);
            renderPrizes(2);
            updateActiveDisplay(1);
            updateActiveDisplay(2);
            updateBenchDisplay(1);
            updateBenchDisplay(2);
            updateStadiumDisplay();
            updateTurnActions(1);
            updateTurnActions(2);
            updateMatchTimer();
            updateMatchInfo();
        }

        // Update Turn indicators & Bottom Ticker details
        function updateMatchInfo() {
            // Ticker Match State format
            const stateEl = document.getElementById('tickerMatchState');
            if (stateEl) {
                stateEl.textContent = `${matchState.matchFormat} • GAME ${matchState.gameNumber}`.toUpperCase();
            }

            // Ticker Turn Indicator
            const turnBox = document.getElementById('turnIndicatorBox');
            const turnLabel = document.getElementById('turnIndicatorLabel');
            
            const activePlayer = matchState[`player${matchState.currentTurn}`];
            const activeName = activePlayer ? activePlayer.name : `PLAYER ${matchState.currentTurn}`;

            if (turnLabel) {
                turnLabel.textContent = `${activeName}'S TURN`.toUpperCase();
            }

            if (turnBox) {
                turnBox.classList.remove('p1-active', 'p2-active');
                if (matchState.currentTurn === 1) {
                    turnBox.classList.add('p1-active');
                } else {
                    turnBox.classList.add('p2-active');
                }
            }

            // Highlighting active panel borders
            const p1Board = document.getElementById('player1Board');
            const p2Board = document.getElementById('player2Board');
            
            if (p1Board && p2Board) {
                p1Board.classList.remove('active-turn');
                p2Board.classList.remove('active-turn');
                
                if (matchState.currentTurn === 1) {
                    p1Board.classList.add('active-turn');
                } else if (matchState.currentTurn === 2) {
                    p2Board.classList.add('active-turn');
                }
            }
        }

        // Overlay visibility animation toggling
        function showOverlay() {
            document.getElementById('overlayContainer').classList.add('visible');
        }

        function hideOverlay() {
            document.getElementById('overlayContainer').classList.remove('visible');
        }

        // Central Animations Handler
        function triggerAnimation(name, playerNum) {
            const overlay = document.getElementById('animationOverlay');
            const nameEl = document.getElementById('animationName');
            const playerNameEl = document.getElementById('animationPlayerName');

            if (!overlay || !nameEl || !playerNameEl) return;

            const player = matchState[`player${playerNum}`];
            const playerName = player ? player.name : '';

            nameEl.textContent = getTrans(`active-animation-${name.toLowerCase().replace('!', '')}`) || name;
            playerNameEl.textContent = playerName.toUpperCase();

            // Set colors based on player
            if (playerNum === 1) {
                nameEl.style.color = '#10b981';
                nameEl.style.textShadow = '0 0 30px rgba(16, 185, 129, 0.6)';
            } else {
                nameEl.style.color = '#ef4444';
                nameEl.style.textShadow = '0 0 30px rgba(239, 68, 68, 0.6)';
            }

            overlay.classList.add('active');

            setTimeout(() => {
                overlay.classList.remove('active');
            }, 3000);
        }

        // Active Evolution Animation
        function triggerEvolutionAnimation(playerNum, slot, benchIndex) {
            const flashEffect = document.getElementById(`player${playerNum}ActiveFlash`);
            if (flashEffect && slot === 'active') {
                flashEffect.classList.remove('active');
                void flashEffect.offsetWidth; // Force reflow
                flashEffect.classList.add('active');
            }
        }

        // Bulk match update
        const handleMatchUpdate = (data) => {
            console.log('Pokemon match update received:', data);
            if (!data) return;

            if (data.player1) {
                Object.keys(data.player1).forEach(key => {
                    matchState.player1[key] = data.player1[key];
                });
            }
            if (data.player2) {
                Object.keys(data.player2).forEach(key => {
                    matchState.player2[key] = data.player2[key];
                });
            }
            if (data.currentTurn !== undefined) {
                matchState.currentTurn = data.currentTurn;
            }
            if (data.timer !== undefined) {
                matchState.timer = data.timer;
            }
            if (data.timerRunning !== undefined) {
                matchState.timerRunning = data.timerRunning;
                if (matchState.timerRunning) {
                    startTimer();
                } else {
                    pauseTimer();
                }
            }
            if (data.gameNumber !== undefined) {
                matchState.gameNumber = data.gameNumber;
            }
            if (data.matchFormat !== undefined) {
                matchState.matchFormat = data.matchFormat;
            }
            if (data.stadium !== undefined) {
                matchState.stadium = data.stadium;
            }
            if (data.language !== undefined) {
                const oldLang = matchState.language;
                matchState.language = data.language;
                if (oldLang !== data.language) {
                    applyTranslations();
                }
            }
            if (data.showOverlay !== undefined) {
                matchState.visible = data.showOverlay;
                if (matchState.visible) {
                    showOverlay();
                } else {
                    hideOverlay();
                }
            }
            if (data.activeAnimation !== undefined) {
                matchState.activeAnimation = data.activeAnimation;
            }

            updateDisplay();
        };

        // Socket listeners
        socket.on('pokemon-match-update', handleMatchUpdate);
        socket.on('pokemon-match-state', handleMatchUpdate);

        socket.on('stadium-update', (data) => {
            matchState.stadium = data.stadium;
            updateStadiumDisplay();
        });

        socket.on('record-update', (data) => {
            const player = `player${data.player}`;
            matchState[player].record = data.record;
            updatePlayerInfo(data.player);
        });

        socket.on('match-score-update', (data) => {
            const player = `player${data.player}`;
            matchState[player].matchScore = data.score;
            updatePlayerInfo(data.player);
        });

        socket.on('turn-actions-update', (data) => {
            const player = `player${data.player}`;
            matchState[player].turnActions = data.actions;
            updateTurnActions(data.player);
        });

        socket.on('turn-actions-reset', () => {
            matchState.player1.turnActions = { energy: false, supporter: false, retreat: false };
            matchState.player2.turnActions = { energy: false, supporter: false, retreat: false };
            updateTurnActions(1);
            updateTurnActions(2);
        });

        socket.on('bench-size-update', (data) => {
            const player = `player${data.player}`;
            matchState[player].benchSize = data.size;
            updateBenchDisplay(data.player);
        });

        socket.on('active-pokemon', (data) => {
            const player = `player${data.player}`;
            matchState[player].active = data.pokemon;
            updateActiveDisplay(data.player);
        });

        socket.on('bench-update', (data) => {
            const player = `player${data.player}`;
            matchState[player].bench = data.bench;
            updateBenchDisplay(data.player);
        });

        socket.on('pokemon-evolved', (data) => {
            setTimeout(() => {
                triggerEvolutionAnimation(data.player, data.slot, data.benchIndex);
            }, 50);
        });

        socket.on('prize-taken', (data) => {
            const player = `player${data.player}`;
            if (!matchState[player].prizesTaken.includes(data.index)) {
                matchState[player].prizesTaken.push(data.index);
                matchState[player].prizes = 6 - matchState[player].prizesTaken.length;
            }
            renderPrizes(data.player);
            updatePlayerInfo(data.player);
        });

        socket.on('prizes-reset', () => {
            matchState.player1.prizesTaken = [];
            matchState.player1.prizes = 6;
            matchState.player2.prizesTaken = [];
            matchState.player2.prizes = 6;
            renderPrizes(1);
            renderPrizes(2);
            updatePlayerInfo(1);
            updatePlayerInfo(2);
        });

        socket.on('turn-switch', (data) => {
            matchState.currentTurn = data.turn;
            updateDisplay();
        });

        socket.on('timer-start', () => {
            startTimer();
        });

        socket.on('timer-pause', () => {
            pauseTimer();
        });

        socket.on('timer-set', (data) => {
            matchState.timer.minutes = data.minutes;
            matchState.timer.seconds = data.seconds;
            updateMatchTimer();
        });

        socket.on('timer-tick', (data) => {
            matchState.timer.minutes = data.minutes;
            matchState.timer.seconds = data.seconds;
            updateMatchTimer();
        });

        socket.on('timer-reset', (data) => {
            pauseTimer();
            if (data) {
                matchState.timer.minutes = data.minutes;
                matchState.timer.seconds = data.seconds;
            } else {
                matchState.timer.minutes = 50;
                matchState.timer.seconds = 0;
            }
            updateMatchTimer();
        });

        socket.on('match-reset', () => {
            pauseTimer();
            matchState.player1.active = null;
            matchState.player1.bench = [];
            matchState.player1.prizes = 6;
            matchState.player1.prizesTaken = [];
            matchState.player1.matchScore = 0;
            matchState.player1.turnActions = { energy: false, supporter: false, retreat: false };
            
            matchState.player2.active = null;
            matchState.player2.bench = [];
            matchState.player2.prizes = 6;
            matchState.player2.prizesTaken = [];
            matchState.player2.matchScore = 0;
            matchState.player2.turnActions = { energy: false, supporter: false, retreat: false };

            matchState.stadium = '';
            matchState.currentTurn = 1;
            matchState.timer = { minutes: 50, seconds: 0 };
            
            updateDisplay();
        });

        socket.on('match-settings', (data) => {
            if (data.format) matchState.matchFormat = data.format;
            if (data.game) matchState.gameNumber = data.game;
            updateMatchInfo();
        });

        socket.on('toggle-pokemon-match', (data) => {
            matchState.visible = data.show;
            if (matchState.visible) {
                showOverlay();
            } else {
                hideOverlay();
            }
        });

        let timerInterval = null;
        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                if (matchState.timer.seconds > 0) {
                    matchState.timer.seconds--;
                } else if (matchState.timer.minutes > 0) {
                    matchState.timer.minutes--;
                    matchState.timer.seconds = 59;
                } else {
                    pauseTimer();
                }
                updateMatchTimer();
            }, 1000);
        }

        function pauseTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // Initialize connection
        socket.on('connect', () => {
            console.log('Connected to server, registering broadcast overlay...');
            socket.emit('register-overlay', 'pokemon-match-broadcast');

            setTimeout(() => {
                socket.emit('request-state', 'pokemon-match-broadcast');
            }, 500);
        });

        // Initial setup on load
        (async () => {
            await fetchTranslations();
            applyTranslations();
        })();
    </script>
</body>
</html>
