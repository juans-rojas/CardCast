<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>CardCast - Professional Broadcast Pokémon TCG Match Overlay</title>
    <!-- Google Fonts for premium esports look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @font-face {
            font-family: 'EssentiarumTCG';
            src: url('/fonts/EssentiarumTCG.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        /* Base Reset & Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Outfit', sans-serif;
            color: #f8fafc;
            overflow: hidden;
            position: relative;
        }

        /* Section I: Universal Card Artwork Crop Rule (aspect-ratio 12:7) */
        .cropped-card-art {
            position: relative;
            overflow: hidden;
            aspect-ratio: 12 / 7;
            border-radius: 4px;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            background-color: #050b18;
        }
        .cropped-card-art img {
            position: absolute;
            width: 119.05%;  /* 100% / 0.84 (width crop is 8% to 92%) */
            height: 285.71%; /* 100% / 0.35 (height crop is 11% to 46%) */
            left: -9.52%;    /* -8% / 0.84 */
            top: -31.43%;    /* -11% / 0.35 */
            object-fit: fill;
        }



        /* Solid Esports-Quality Panels (Play! Pokemon Blue Theme) */
        .panel {
            position: absolute;
            top: 0;
            width: 384px;
            height: 1080px;
            background: linear-gradient(180deg, #09183b 0%, #050d1e 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 14px 16px;
            border-bottom: 4px solid #1e40af;
            box-shadow: 8px 0 24px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .panel.left {
            left: 0;
            border-right: 3px solid #1e3a8a;
        }
        .panel.right {
            right: 0;
            border-left: 3px solid #1e3a8a;
        }

        /* Active Player Turn Glow Highlight (Highlighting border only) */
        .panel.left.active-turn {
            border-right: 5px solid #10b981;
            box-shadow: 12px 0 28px rgba(16, 185, 129, 0.25);
        }
        .panel.right.active-turn {
            border-left: 5px solid #ef4444;
            box-shadow: -12px 0 28px rgba(239, 68, 68, 0.25);
        }

        /* Player Header Block styles */
        .player-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
            height: 94px;
        }
        .player-header.mirrored {
            flex-direction: row-reverse;
        }
        .player-info-text {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .player-header.mirrored .player-info-text {
            text-align: right;
            align-items: flex-end;
        }
        .player-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 26px;
            color: #ffffff;
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .player-score {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 19px;
            color: #fbbf24; /* Amber points */
            margin-top: 1px;
        }
        .player-stats-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 3px;
        }
        .player-header.mirrored .player-stats-row {
            flex-direction: row-reverse;
        }
        .player-record {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
        }
        .player-flag {
            width: 18px;
            height: 12px;
            object-fit: cover;
            border-radius: 1px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Prize Pokeballs Vertical Stack (Adjacent side scoring) */
        .prize-pokeballs-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 240px;
            width: 32px;
            padding: 2px 0;
            z-index: 20;
        }
        .panel.left .prize-pokeballs-container {
            right: -45px;
            top: 20px;
        }
        .panel.right .prize-pokeballs-container {
            left: -45px;
            top: 20px;
        }
        .pokeball-icon {
            width: 28px;
            height: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .pokeball-icon.taken {
            opacity: 0.15;
            filter: grayscale(1) contrast(0.5);
            transform: scale(0.85);
        }
        .pokeball-icon.penalty {
            filter: drop-shadow(0 0 5px #ef4444);
            animation: penaltyGlow 2s infinite ease-in-out;
        }
        @keyframes penaltyGlow {
            0%, 100% { filter: drop-shadow(0 0 4px #ef4444); }
            50% { filter: drop-shadow(0 0 10px #ef4444); }
        }

        /* Active Pokemon Display Zone (Bigger & Solid Column layout) */
        .active-zone {
            background: #0b1c45;
            border: 1.5px solid #1e3a8a;
            border-radius: 6px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .panel.left .active-zone {
            border-left: 4px solid #10b981;
        }
        .panel.right .active-zone {
            border-right: 4px solid #ef4444;
        }
        .active-top-row {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .active-artwork-frame {
            width: 100%;
            aspect-ratio: 12 / 7;
            position: relative;
            overflow: hidden;
            border-bottom: 1.5px solid #1e3a8a;
            flex-shrink: 0;
        }
        .active-text-details {
            display: flex;
            flex-direction: column;
            padding: 10px 12px 12px 12px;
            width: 100%;
            box-sizing: border-box;
        }
        .active-pokemon-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .active-hp-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 700;
            color: #cbd5e1;
            margin-top: 2px;
            margin-bottom: 3px;
        }
        .hp-bar-outer {
            width: 100%;
            height: 15px;
            background: rgba(0,0,0,0.6);
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .hp-bar-inner {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            transition: width 0.3s ease;
        }
        .hp-bar-inner.low {
            background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 100%);
        }
        .hp-bar-inner.critical {
            background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%);
        }

        /* Detail Attacks & Energies Grid Row */
        .active-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 4px;
        }
        .active-attacks-list {
            display: flex;
            flex-direction: column;
            gap: 2.5px;
            flex: 1;
            min-w: 0;
        }
        .active-attack-item {
            font-size: 10.5px;
            color: #e2e8f0;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .active-attack-item.ability {
            color: #f59e0b;
            font-weight: 700;
        }
        .active-attack-item.attack {
            color: #60a5fa;
        }

        .active-badge-row {
            display: flex;
            align-items: center;
            gap: 3px;
            flex-wrap: wrap;
            max-width: 110px;
            justify-content: flex-end;
            flex-shrink: 0;
        }
        .energy-circle {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.4);
            border: 1px solid rgba(0,0,0,0.15);
        }
        .energy-icon-char {
            font-family: 'EssentiarumTCG', sans-serif;
            font-size: 10.5px;
            line-height: 1;
        }
        .tool-badge {
            background: rgba(6, 78, 59, 0.9);
            border: 1px solid rgba(52, 211, 153, 0.25);
            color: #34d399;
            font-size: 8px;
            font-weight: 700;
            padding: 0px 3px;
            border-radius: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60px;
        }

        /* Benched Zone (Expanded 8 slots vertical stack) */
        .bench-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .bench-slot {
            min-height: 72px;
            height: auto;
            background: #081534;
            border: 1.5px solid #1e3a8a;
            border-radius: 5px;
            display: flex;
            align-items: center;
            overflow: hidden;
            padding: 6px 8px;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .bench-slot.empty {
            border: 1px dashed rgba(255, 255, 255, 0.08);
            background: rgba(8, 15, 36, 0.3);
            justify-content: center;
        }
        .bench-empty-text {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 2.5px;
            color: rgba(255, 255, 255, 0.16);
            text-transform: uppercase;
        }
        .bench-art-thumb {
            width: 110px; /* Cropped landscape thumbnail */
            flex-shrink: 0;
        }
        .bench-slot-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
            min-w: 0;
            gap: 2px;
        }
        .bench-name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bench-pokemon-name {
            font-weight: 700;
            font-size: 12px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }
        .bench-pokemon-hp {
            font-size: 10.5px;
            color: #94a3b8;
            font-weight: 700;
        }
        .bench-abilities-summary {
            font-size: 9.5px;
            color: #38bdf8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.9;
        }

        /* Turn Action Badges (Controls) */
        .status-indicators {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: auto;
            padding-top: 4px;
            flex-shrink: 0;
        }
        .status-badge {
            flex: 1;
            height: 28px;
            background: #081534;
            border: 1.5px solid #1e3a8a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        .panel.left .status-badge.active {
            color: #10b981;
            background: rgba(16, 185, 129, 0.12);
            border-color: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
            text-shadow: 0 0 4px rgba(16, 185, 129, 0.4);
        }
        .panel.right .status-badge.active {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.12);
            border-color: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
            text-shadow: 0 0 4px rgba(239, 68, 68, 0.4);
        }

        /* Section II: Top-Center Element (Stadium Zone) */
        .stadium-zone {
            position: absolute;
            top: 0;
            left: 384px;
            width: 1152px;
            height: 120px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .stadium-holder {
            width: 360px;
            height: 90px;
            background: linear-gradient(180deg, #09183b 0%, #050d1e 100%);
            border: 2px solid #1e3a8a;
            border-top: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border-radius: 0 0 10px 10px;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 12px;
            pointer-events: auto;
        }
        .stadium-art-crop {
            width: 120px; /* Cropped landscape Stadium card */
            flex-shrink: 0;
        }
        .stadium-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-w: 0;
            flex: 1;
        }
        .stadium-label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .stadium-name {
            font-weight: 700;
            font-size: 14px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Section VII: Integrated Bottom Ticker and Branding */
        .bottom-ticker-container {
            position: absolute;
            left: 384px;
            bottom: 0;
            width: 1152px;
            height: 120px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 24px;
            pointer-events: none;
        }
        .ticker-bar {
            width: 1080px;
            height: 56px;
            background: linear-gradient(90deg, #09183b 0%, #050d1e 100%);
            border: 2px solid #1e3a8a;
            border-bottom: 4px solid #1d4ed8;
            border-radius: 6px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            pointer-events: auto;
        }
        .ticker-section {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }
        .ticker-section.left {
            justify-content: flex-start;
        }
        .ticker-section.center {
            justify-content: center;
            flex: 0 0 auto;
        }
        .ticker-section.right {
            justify-content: flex-end;
        }
        
        .ticker-branding {
            display: flex;
            flex-direction: column;
        }
        .ticker-event-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 13px;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .ticker-match-state {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Central Digital Timer */
        .timer-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1.5px solid #1e3a8a;
            border-radius: 4px;
            padding: 4px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
        }
        .timer-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 26px;
            font-weight: 700;
            color: #38bdf8;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.3);
        }

        /* Turn Indicator */
        .turn-indicator-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #081534;
            padding: 6px 16px;
            border-radius: 4px;
            border: 1.5px solid #1e3a8a;
            transition: all 0.3s ease;
        }
        .turn-indicator-box.p1-active {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.08);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }
        .turn-indicator-box.p2-active {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.1);
        }
        .turn-indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #475569;
            transition: all 0.3s ease;
        }
        .turn-indicator-box.p1-active .turn-indicator-dot {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        .turn-indicator-box.p2-active .turn-indicator-dot {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }
        .turn-indicator-label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            transition: all 0.3s ease;
        }
        .turn-indicator-box.p1-active .turn-indicator-label {
            color: #10b981;
        }
        .turn-indicator-box.p2-active .turn-indicator-label {
            color: #ef4444;
        }

        /* Visibility transition */
        .overlay-container {
            width: 1920px;
            height: 1080px;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.985);
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .overlay-container.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        
        /* Centered Animations Overlay */
        .animation-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .animation-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .animation-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 800;
            font-size: 96px;
            color: #f59e0b;
            text-shadow: 0 0 30px rgba(245, 158, 11, 0.6);
            letter-spacing: 6px;
            text-transform: uppercase;
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .animation-overlay.active .animation-name {
            transform: scale(1);
        }
        .animation-player-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 42px;
            color: #ffffff;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Evolve Flash Animation */
        .evolve-flash-effect {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.4) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 20;
        }
        .evolve-flash-effect.active {
            animation: flashPulse 1.2s ease forwards;
        }
        @keyframes flashPulse {
            0% { opacity: 0; }
            20% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* HP hit/heal animation classes & keyframes */
        .hp-bar-inner.hit {
            animation: hpHitPulse 0.9s ease forwards;
            box-shadow: 0 0 18px rgba(239, 68, 68, 0.75);
        }
        .hp-bar-inner.heal {
            animation: hpHealPulse 0.9s ease forwards;
            box-shadow: 0 0 18px rgba(16, 185, 129, 0.75);
        }
        @keyframes hpHitPulse {
            0%, 100% { transform: scaleX(1); }
            20% { transform: scaleX(1.04); }
            50% { transform: scaleX(1.02); }
        }
        @keyframes hpHealPulse {
            0%, 100% { transform: scaleX(1); }
            20% { transform: scaleX(1.04); }
            50% { transform: scaleX(1.02); }
        }

        /* Evolution card border glows */
        .active-artwork-frame.evolving {
            animation: cardContainerEvolveGlow 1.8s ease forwards;
        }
        .active-artwork-frame.evolving img {
            animation: cardImgEvolveBrightness 1.8s ease forwards;
        }
        .bench-art-thumb.evolving {
            animation: benchContainerEvolveGlow 1.8s ease forwards;
        }
        .bench-art-thumb.evolving img {
            animation: cardImgEvolveBrightness 1.8s ease forwards;
        }
        @keyframes cardContainerEvolveGlow {
            0% { box-shadow: 0 0 0px rgba(245, 158, 11, 0); }
            20% { box-shadow: 0 0 40px rgba(245, 158, 11, 1); border-color: rgba(245, 158, 11, 1); }
            40% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(245, 158, 11, 0.8); border-color: rgba(255, 255, 255, 0.8); }
            80% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 0 30px rgba(245, 158, 11, 0.6); }
            100% { box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); }
        }
        @keyframes benchContainerEvolveGlow {
            0% { box-shadow: 0 0 0px rgba(245, 158, 11, 0); }
            20% { box-shadow: 0 0 25px rgba(245, 158, 11, 1); border-color: rgba(245, 158, 11, 1); }
            40% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 25px rgba(245, 158, 11, 0.8); border-color: rgba(255, 255, 255, 0.8); }
            80% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 15px rgba(245, 158, 11, 0.6); }
            100% { box-shadow: none; }
        }
        @keyframes cardImgEvolveBrightness {
            0% { filter: brightness(1); }
            20% { filter: brightness(1.3); }
            40% { filter: brightness(1.1); }
            80% { filter: brightness(1.05); }
            100% { filter: brightness(1); }
        }

        /* Knock Out (K.O.) Display Overlays */
        .ko-flash {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            padding: 4px 12px;
            border-radius: 9999px;
            background: #000000;
            color: #ef4444;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 1.5px solid #ef4444;
            opacity: 0;
            pointer-events: none;
            z-index: 18;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
            display: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
        }
        .ko-flash.active {
            display: block;
            animation: koPulseActive 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes koPulseActive {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>

    <!-- Script Section -->
    <script>
        const socket = io();

        // Match State Cache
        const matchState = {
            player1: {
                name: 'Player 1',
                active: null,
                bench: [],
                benchSize: 5,
                prizes: 6,
                prizesTaken: [],
                record: { wins: 0, losses: 0, ties: 0 },
                matchScore: 0,
                turnActions: { energy: false, supporter: false, retreat: false }
            },
            player2: {
                name: 'Player 2',
                active: null,
                bench: [],
                benchSize: 5,
                prizes: 6,
                prizesTaken: [],
                record: { wins: 0, losses: 0, ties: 0 },
                matchScore: 0,
                turnActions: { energy: false, supporter: false, retreat: false }
            },
            currentTurn: 1,
            timer: { minutes: 50, seconds: 0 },
            timerRunning: false,
            gameNumber: 1,
            matchFormat: 'Best of 3',
            stadium: '',
            visible: false,
            customText: '',
            activeAnimation: null,
            language: 'en'
        };

        let translations = null;

        // Load translations
        async function fetchTranslations() {
            try {
                const response = await fetch('/translations.json');
                translations = await response.json();
                console.log('Broadcast translations loaded:', translations);
            } catch (err) {
                console.error('Failed to load translations:', err);
            }
        }

        function getTrans(key) {
            const lang = matchState.language || 'en';
            if (translations && translations[lang] && translations[lang][key]) {
                return translations[lang][key];
            }
            if (translations && translations['en'] && translations['en'][key]) {
                return translations['en'][key];
            }
            return key;
        }

        function applyTranslations() {
            // Apply static text translation
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const translation = getTrans(key);
                if (translation && translation !== key) {
                    el.innerHTML = translation;
                }
            });
            updateDisplay();
        }

        // EssentiarumTCG font energy type map: name → { char, color }
        const ENERGY_ICON_MAP = {
            'colorless': { char: 'c', color: '#e0e0e0' },
            'darkness': { char: 'd', color: '#1a4a3a' },
            'fighting': { char: 'f', color: '#a0522d' },
            'grass': { char: 'g', color: '#3aaa35' },
            'lightning': { char: 'l', color: '#f5d800' },
            'metal': { char: 'm', color: '#b0bec5' },
            'dragon': { char: 'n', color: '#c9a227' },
            'psychic': { char: 'p', color: '#a020f0' },
            'fire': { char: 'r', color: '#e8381a' },
            'water': { char: 'w', color: '#2979ff' }
        };

        function getEnergyIcon(energyName) {
            if (!energyName) return { char: 'c', color: '#e0e0e0' };
            const key = energyName.toLowerCase().replace(/\s*energy\s*$/i, '').trim();
            return ENERGY_ICON_MAP[key] || { char: 'c', color: '#e0e0e0' };
        }

        // Returns styling for energy circles matching user specification
        function getEnergyCircleStyle(energyName) {
            const { char, color } = getEnergyIcon(energyName);
            const isColorless = (energyName || '').toLowerCase().includes('colorless');
            
            const bg = isColorless ? '#ffffff' : color;
            const border = `1.5px solid ${color}`;
            const textCol = isColorless ? '#000000' : '#ffffff';
            
            return { char, bg, border, textCol, color };
        }

        // Render cost circles using energy types matching the other overlay
        function renderCostCircles(costString) {
            const energyTypes = costString ? (costString.match(/[A-Z][a-z]+/g) || []) : [];
            let html = '';
            energyTypes.forEach(type => {
                const { char, bg, border, textCol } = getEnergyCircleStyle(type);
                html += `<div class="energy-circle" style="background-color: ${bg}; border: ${border}; display: inline-flex; width: 14px; height: 14px; margin-right: 2px; border-radius: 50%; align-items: center; justify-content: center; box-shadow: 0 1px 2px rgba(0,0,0,0.4);" title="${type}">
                    <span class="energy-icon-char" style="font-family: 'EssentiarumTCG', sans-serif; font-size: 9px; line-height: 1; color: ${textCol};">${char}</span>
                </div>`;
            });
            return `<div class="attack-cost-container" style="display: flex; align-items: center; flex-shrink: 0; min-width: 44px;">${html}</div>`;
        }

        // Render Pokemon inline details container containing ability and attacks list
        function renderAbilitiesAndAttacks(pokemon) {
            if (!pokemon) return '';
            let html = '';

            // 1. Ability
            if (pokemon.ability_name) {
                const isUsed = pokemon.abilityUsed === true;
                const usedStyle = isUsed ? 'opacity: 0.35; text-decoration: line-through; color: #94a3b8 !important;' : '';
                html += `
                    <div class="pokemon-ability-row" style="font-size: 10.5px; font-weight: 700; color: #f59e0b; margin-bottom: 2px; display: flex; align-items: center; gap: 4px; ${usedStyle}">
                        <span style="text-transform: uppercase; opacity: 0.85;">Ability:</span>
                        <span>${pokemon.ability_name}</span>
                    </div>
                `;
            }

            // 2. Attacks
            const attacks = [];
            if (pokemon.attack1_name) {
                attacks.push({
                    name: pokemon.attack1_name,
                    cost: pokemon.attack1_cost,
                    damage: pokemon.attack1_damage
                });
            }
            if (pokemon.attack2_name) {
                attacks.push({
                    name: pokemon.attack2_name,
                    cost: pokemon.attack2_cost,
                    damage: pokemon.attack2_damage
                });
            }

            if (attacks.length > 0) {
                html += '<div class="pokemon-attacks-list" style="display: flex; flex-direction: column; gap: 2.5px; width: 100%;">';
                attacks.forEach(att => {
                    const costHtml = renderCostCircles(att.cost);
                    html += `
                        <div class="pokemon-attack-row" style="display: flex; align-items: center; justify-content: space-between; font-size: 10.5px; width: 100%; gap: 6px;">
                            <div style="display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1;">
                                ${costHtml}
                                <span class="attack-name-text" style="font-weight: 600; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; letter-spacing: 0.2px;">${att.name}</span>
                            </div>
                            <span style="font-weight: 700; color: #60a5fa; flex-shrink: 0;">${att.damage || ''}</span>
                        </div>
                    `;
                });
                html += '</div>';
            }

            return `<div class="pokemon-details-container" style="display: flex; flex-direction: column; width: 100%; padding: 2px 0;">${html}</div>`;
        }

        // Render card attached energy and tools directly inside the artwork frame
        function renderCardOverlayBadges(frameEl, energies, tools) {
            if (!frameEl) return;

            const existingEnergies = frameEl.querySelector('.active-energies-bar');
            if (existingEnergies) existingEnergies.remove();
            const existingTools = frameEl.querySelector('.active-tools-bar');
            if (existingTools) existingTools.remove();

            const isActive = frameEl.classList.contains('active-artwork-frame');
            const energySize = isActive ? 18 : 14;
            const energyFontSize = isActive ? 11 : 9;
            const toolPadding = isActive ? '1px 4px' : '1px 3px';
            const toolFontSize = isActive ? 8 : 6;
            const toolGap = isActive ? 3 : 2;

            // 1. Render energies (bottom-left)
            if (energies && energies.length > 0) {
                const energiesBar = document.createElement('div');
                energiesBar.className = 'active-energies-bar';
                energiesBar.style.cssText = 'position: absolute; bottom: 6px; left: 6px; display: flex; gap: 4px; z-index: 15; pointer-events: none;';
                energies.forEach(energy => {
                    const { char, bg, border, textCol } = getEnergyCircleStyle(energy.name);
                    const item = document.createElement('div');
                    item.className = 'active-energy-bar';
                    item.style.cssText = `background-color: ${bg}; border: ${border}; width: ${energySize}px; height: ${energySize}px; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;`;
                    item.innerHTML = `<span class="active-energy-icon" style="font-family: 'EssentiarumTCG', sans-serif; font-size: ${energyFontSize}px; line-height: 1; color: ${textCol};">${char}</span>`;
                    energiesBar.appendChild(item);
                });
                frameEl.appendChild(energiesBar);
            }

            // 2. Render tools (top-center)
            if (tools && tools.length > 0) {
                const toolsBar = document.createElement('div');
                toolsBar.className = 'active-tools-bar';
                toolsBar.style.cssText = 'position: absolute; top: 6px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 15; pointer-events: none;';
                tools.forEach(tool => {
                    const item = document.createElement('div');
                    item.className = 'active-tool-bar';
                    item.style.cssText = `background: rgba(6, 78, 59, 0.9); border: 1px solid rgba(16, 185, 129, 0.6); color: white; font-size: ${toolFontSize}px; font-weight: bold; padding: ${toolPadding}; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.6); display: flex; align-items: center; gap: ${toolGap}px; white-space: nowrap;`;
                    item.innerHTML = `<span class="active-tool-icon">🔧</span><span class="active-tool-label" style="font-size: ${toolFontSize - 1}px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">${tool.name}</span>`;
                    toolsBar.appendChild(item);
                });
                frameEl.appendChild(toolsBar);
            }
        }

        // Get hit/heal class for HP bar fills
        function getHpAnimationClass(oldHp, newHp) {
            if (oldHp === null || oldHp === undefined || newHp === null || newHp === undefined) {
                return '';
            }
            if (newHp < oldHp) return 'hit';
            if (newHp > oldHp) return 'heal';
            return '';
        }

        // Trigger overlay class addition/removal animation helper
        function triggerOverlayAnimation(element, className) {
            if (!element || !className) return;
            element.classList.remove(className);
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    element.classList.add(className);
                });
            });
            setTimeout(() => {
                if (element) element.classList.remove(className);
            }, 950);
        }

        // Render Prize Pokeballs Stack
        function renderPrizes(playerNum) {
            const player = matchState[`player${playerNum}`];
            const container = document.getElementById(`player${playerNum}PrizeCards`);
            if (!container) return;

            container.innerHTML = '';
            
            // Generate exactly 6 Pokeballs
            for (let i = 0; i < 6; i++) {
                let svgClass = 'pokeball-icon';
                let topFill = '#ef4444';
                let bottomFill = '#ffffff';
                let centerFill = '#ffffff';
                
                const isPenalty = player.penaltyPrizes && player.penaltyPrizes[i];
                const isTaken = !isPenalty && ((player.prizesTaken && player.prizesTaken.includes(i)) || (i < (6 - player.prizes)));
                
                if (isPenalty) {
                    svgClass = 'pokeball-icon penalty';
                    topFill = '#7f1d1d';
                    bottomFill = '#111827';
                    centerFill = '#ef4444';
                } else if (isTaken) {
                    svgClass = 'pokeball-icon taken';
                }
                
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', '0 0 100 100');
                svg.setAttribute('class', svgClass);
                svg.innerHTML = `
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#000000" stroke-width="8"/>
                    <path d="M 5,50 A 45,45 0 0,1 95,50 Z" fill="${topFill}" stroke="#000000" stroke-width="8"/>
                    <path d="M 5,50 A 45,45 0 0,0 95,50 Z" fill="${bottomFill}" stroke="#000000" stroke-width="8"/>
                    <line x1="5" y1="50" x2="95" y2="50" stroke="#000000" stroke-width="8"/>
                    <circle cx="50" cy="50" r="15" fill="${centerFill}" stroke="#000000" stroke-width="8"/>
                    <circle cx="50" cy="50" r="6" fill="${centerFill}" stroke="#000000" stroke-width="4"/>
                `;
                container.appendChild(svg);
            }
        }

        // Render Active Pokemon display
        function updateActiveDisplay(playerNum) {
            const player = matchState[`player${playerNum}`];
            const nameEl = document.getElementById(`player${playerNum}ActiveName`);
            const imageEl = document.getElementById(`player${playerNum}ActiveImage`);
            const detailsEl = document.getElementById(`player${playerNum}ActiveAbilitiesAttacks`);
            const hpTextEl = document.getElementById(`player${playerNum}ActiveHpText`);
            const hpFillEl = document.getElementById(`player${playerNum}ActiveHpFill`);
            const koFlash = document.getElementById(`player${playerNum}ActiveKoFlash`);

            if (player.active) {
                nameEl.textContent = player.active.name.toUpperCase();
                imageEl.src = player.active.image || '/images/card-back.png';
                imageEl.style.display = 'block';

                // Render Abilities and Attacks inline
                if (detailsEl) {
                    detailsEl.innerHTML = renderAbilitiesAndAttacks(player.active);
                }

                // Render active card overlays
                renderCardOverlayBadges(document.getElementById(`player${playerNum}ActiveCardFrame`), player.active.energies, player.active.tools);

                // Render KO state
                if (koFlash) {
                    if (player.active.isKnockedOut) {
                        koFlash.classList.add('active');
                    } else {
                        koFlash.classList.remove('active');
                    }
                }

                // HP Bar
                const maxHp = player.active.maxHp || 100;
                const currHp = Math.max(0, player.active.currentHp !== undefined ? player.active.currentHp : maxHp);
                hpTextEl.textContent = `${currHp} / ${maxHp} HP`;
                
                const percent = Math.min(100, Math.max(0, (currHp / maxHp) * 100));
                hpFillEl.style.width = `${percent}%`;
                
                // Colors & Hit/Heal Animation
                hpFillEl.className = 'hp-bar-inner';
                if (percent <= 20) {
                    hpFillEl.classList.add('critical');
                } else if (percent < 80) {
                    hpFillEl.classList.add('low');
                }

                const animClass = getHpAnimationClass(player.prevActiveHp, currHp);
                if (animClass) {
                    triggerOverlayAnimation(hpFillEl, animClass);
                }
                player.prevActiveHp = currHp;

            } else {
                nameEl.textContent = getTrans('no-active-pokemon').toUpperCase();
                imageEl.src = '/images/card-back.png';
                if (detailsEl) {
                    detailsEl.innerHTML = '';
                }
                renderCardOverlayBadges(document.getElementById(`player${playerNum}ActiveCardFrame`), [], []);
                if (koFlash) {
                    koFlash.classList.remove('active');
                }
                hpTextEl.textContent = '0 / 0';
                hpFillEl.style.width = '0%';
                player.prevActiveHp = null;
            }
        }

        // Render Bench Display (Exactly 8 structured slots)
        function updateBenchDisplay(playerNum) {
            const player = matchState[`player${playerNum}`];
            const container = document.getElementById(`player${playerNum}Bench`);
            if (!container) return;

            if (!Array.isArray(player.prevBenchHps)) {
                player.prevBenchHps = [];
            }
            while (player.prevBenchHps.length < 8) {
                player.prevBenchHps.push(null);
            }

            container.innerHTML = '';

            // Generate exactly 8 slots
            for (let i = 0; i < 8; i++) {
                const slotEl = document.createElement('div');
                
                if (player.bench && player.bench[i]) {
                    const pokemon = player.bench[i];
                    slotEl.className = 'bench-slot';
                    
                    // HP percent calculations
                    const maxHp = pokemon.maxHp || 100;
                    const currHp = Math.max(0, pokemon.currentHp !== undefined ? pokemon.currentHp : maxHp);
                    const percent = Math.min(100, Math.max(0, (currHp / maxHp) * 100));
                    
                    let hpColor = '';
                    if (percent <= 20) hpColor = 'critical';
                    else if (percent < 80) hpColor = 'low';

                    const detailsHtml = renderAbilitiesAndAttacks(pokemon);

                    slotEl.innerHTML = `
                        <div class="cropped-card-art bench-art-thumb">
                            <img src="${pokemon.image || '/images/card-back.png'}" alt="${pokemon.name}">
                            <div class="ko-flash ${pokemon.isKnockedOut ? 'active' : ''}" style="font-size: 10px; padding: 2px 6px;">K.O.</div>
                        </div>
                        <div class="bench-slot-details" style="display: flex; flex-direction: column; flex: 1; min-width: 0; gap: 2px;">
                            <div class="bench-name-row" style="display: flex; justify-content: space-between; align-items: center;">
                                <span class="bench-pokemon-name">${pokemon.name}</span>
                                <span class="bench-pokemon-hp">${currHp}/${maxHp}</span>
                            </div>
                            ${detailsHtml}
                            <div class="hp-bar-outer" style="margin-top:2px;">
                                <div class="hp-bar-inner ${hpColor}" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    `;
                    
                    // Render attachments for bench slot
                    const artThumb = slotEl.querySelector('.bench-art-thumb');
                    renderCardOverlayBadges(artThumb, pokemon.energies, pokemon.tools);
                } else {
                    slotEl.className = 'bench-slot empty';
                    slotEl.innerHTML = `<span class="bench-empty-text">${getTrans('empty-slot-label')}</span>`;
                }
                container.appendChild(slotEl);
            }

            // Trigger HP animations for bench slots
            for (let i = 0; i < 8; i++) {
                const pokemon = player.bench && player.bench[i];
                const slotEl = container.children[i];
                if (!pokemon || !slotEl) {
                    player.prevBenchHps[i] = null;
                    continue;
                }
                const hpFillEl = slotEl.querySelector('.hp-bar-inner');
                const animClass = getHpAnimationClass(player.prevBenchHps[i], pokemon.currentHp);
                if (animClass && hpFillEl) {
                    triggerOverlayAnimation(hpFillEl, animClass);
                }
                player.prevBenchHps[i] = pokemon.currentHp;
            }
        }

        // Render Stadium Display
        function updateStadiumDisplay() {
            const nameEl = document.getElementById('stadiumName');
            const imageEl = document.getElementById('stadiumImage');
            
            if (matchState.stadium) {
                if (typeof matchState.stadium === 'object') {
                    nameEl.textContent = (matchState.stadium.name || '').toUpperCase();
                    imageEl.src = matchState.stadium.image || '/images/card-back.png';
                } else {
                    nameEl.textContent = matchState.stadium.toUpperCase();
                    imageEl.src = `/cache/images/pokemon/${encodeURIComponent(matchState.stadium)}.png`;
                }
            } else {
                nameEl.textContent = 'NO ACTIVE STADIUM';
                imageEl.src = '/images/card-back.png';
            }
        }

        // Update turn action indicator badges
        function updateTurnActions(playerNum) {
            const actions = matchState[`player${playerNum}`].turnActions;
            const isCurrentTurn = matchState.currentTurn === playerNum;
            
            const energyEl = document.getElementById(`player${playerNum}EnergyAction`);
            const supporterEl = document.getElementById(`player${playerNum}SupporterAction`);
            const retreatEl = document.getElementById(`player${playerNum}RetreatAction`);

            if (energyEl) {
                if (isCurrentTurn && !actions.energy) energyEl.classList.add('active');
                else energyEl.classList.remove('active');
            }
            if (supporterEl) {
                if (isCurrentTurn && !actions.supporter) supporterEl.classList.add('active');
                else supporterEl.classList.remove('active');
            }
            if (retreatEl) {
                if (isCurrentTurn && !actions.retreat) retreatEl.classList.add('active');
                else retreatEl.classList.remove('active');
            }
        }

        // Update timer display
        function updateMatchTimer() {
            const timerEl = document.getElementById('tickerTimer');
            if (!timerEl) return;

            const min = String(matchState.timer.minutes).padStart(2, '0');
            const sec = String(matchState.timer.seconds).padStart(2, '0');
            timerEl.textContent = `${min}:${sec}`;
        }

        // Update overall score & names
        function updatePlayerInfo(playerNum) {
            const nameEl = document.getElementById(`player${playerNum}Name`);
            const scoreEl = document.getElementById(`player${playerNum}Score`);
            const recordEl = document.getElementById(`player${playerNum}Record`);

            const pData = matchState[`player${playerNum}`];
            if (nameEl) nameEl.textContent = pData.name.toUpperCase();
            if (scoreEl) scoreEl.textContent = `SCORE: ${pData.matchScore}`;
            
            if (recordEl) {
                const r = pData.record;
                if (typeof r === 'object') {
                    recordEl.textContent = `${r.wins}-${r.losses}-${r.ties}`;
                } else {
                    recordEl.textContent = r;
                }
            }
        }

        // Render overall layout updates
        function updateDisplay() {
            updatePlayerInfo(1);
            updatePlayerInfo(2);
            renderPrizes(1);
            renderPrizes(2);
            updateActiveDisplay(1);
            updateActiveDisplay(2);
            updateBenchDisplay(1);
            updateBenchDisplay(2);
            updateStadiumDisplay();
            updateTurnActions(1);
            updateTurnActions(2);
            updateMatchTimer();
            updateMatchInfo();
        }

        // Update Turn indicators & Bottom Ticker details
        function updateMatchInfo() {
            // Ticker Match State format
            const stateEl = document.getElementById('tickerMatchState');
            if (stateEl) {
                stateEl.textContent = `${matchState.matchFormat} • GAME ${matchState.gameNumber}`.toUpperCase();
            }

            // Ticker Turn Indicator
            const turnBox = document.getElementById('turnIndicatorBox');
            const turnLabel = document.getElementById('turnIndicatorLabel');
            
            const activePlayer = matchState[`player${matchState.currentTurn}`];
            const activeName = activePlayer ? activePlayer.name : `PLAYER ${matchState.currentTurn}`;

            if (turnLabel) {
                turnLabel.textContent = `${activeName}'S TURN`.toUpperCase();
            }

            if (turnBox) {
                turnBox.classList.remove('p1-active', 'p2-active');
                if (matchState.currentTurn === 1) {
                    turnBox.classList.add('p1-active');
                } else {
                    turnBox.classList.add('p2-active');
                }
            }

            // Highlighting active panel borders
            const p1Board = document.getElementById('player1Board');
            const p2Board = document.getElementById('player2Board');
            
            if (p1Board && p2Board) {
                p1Board.classList.remove('active-turn');
                p2Board.classList.remove('active-turn');
                
                if (matchState.currentTurn === 1) {
                    p1Board.classList.add('active-turn');
                } else if (matchState.currentTurn === 2) {
                    p2Board.classList.add('active-turn');
                }
            }
        }

        // Overlay visibility animation toggling
        function showOverlay() {
            document.getElementById('overlayContainer').classList.add('visible');
        }

        function hideOverlay() {
            document.getElementById('overlayContainer').classList.remove('visible');
        }

        // Central Animations Handler
        function triggerAnimation(name, playerNum) {
            const overlay = document.getElementById('animationOverlay');
            const nameEl = document.getElementById('animationName');
            const playerNameEl = document.getElementById('animationPlayerName');

            if (!overlay || !nameEl || !playerNameEl) return;

            const player = matchState[`player${playerNum}`];
            const playerName = player ? player.name : '';

            nameEl.textContent = getTrans(`active-animation-${name.toLowerCase().replace('!', '')}`) || name;
            playerNameEl.textContent = playerName.toUpperCase();

            // Set colors based on player
            if (playerNum === 1) {
                nameEl.style.color = '#10b981';
                nameEl.style.textShadow = '0 0 30px rgba(16, 185, 129, 0.6)';
            } else {
                nameEl.style.color = '#ef4444';
                nameEl.style.textShadow = '0 0 30px rgba(239, 68, 68, 0.6)';
            }

            overlay.classList.add('active');

            setTimeout(() => {
                overlay.classList.remove('active');
            }, 3000);
        }

        // Active/Bench Evolution Animation handler
        function triggerEvolutionAnimation(playerNum, slot, benchIndex = null) {
            let flash;
            let cardContainer;
            if (slot === 'active') {
                cardContainer = document.getElementById(`player${playerNum}ActiveCardFrame`);
                flash = document.getElementById(`player${playerNum}ActiveFlash`);
            } else {
                const benchDiv = document.getElementById(`player${playerNum}Bench`);
                if (benchDiv && benchIndex !== null && benchDiv.children[benchIndex]) {
                    cardContainer = benchDiv.children[benchIndex].querySelector('.bench-art-thumb');
                }
            }

            if (flash) {
                flash.classList.remove('active');
                void flash.offsetWidth;
                flash.classList.add('active');
                setTimeout(() => {
                    if (flash) flash.classList.remove('active');
                }, 1800);
            }

            if (cardContainer) {
                cardContainer.classList.remove('evolving');
                void cardContainer.offsetWidth;
                cardContainer.classList.add('evolving');
                setTimeout(() => {
                    if (cardContainer) cardContainer.classList.remove('evolving');
                }, 1800);
            }
        }

        // Bulk match update
        const handleMatchUpdate = (data) => {
            console.log('Pokemon match update received:', data);
            if (!data) return;

            if (data.player1) {
                Object.keys(data.player1).forEach(key => {
                    matchState.player1[key] = data.player1[key];
                });
            }
            if (data.player2) {
                Object.keys(data.player2).forEach(key => {
                    matchState.player2[key] = data.player2[key];
                });
            }
            if (data.currentTurn !== undefined) {
                matchState.currentTurn = data.currentTurn;
            }
            if (data.timer !== undefined) {
                matchState.timer = data.timer;
            }
            if (data.timerRunning !== undefined) {
                matchState.timerRunning = data.timerRunning;
                if (matchState.timerRunning) {
                    startTimer();
                } else {
                    pauseTimer();
                }
            }
            if (data.gameNumber !== undefined) {
                matchState.gameNumber = data.gameNumber;
            }
            if (data.matchFormat !== undefined) {
                matchState.matchFormat = data.matchFormat;
            }
            if (data.stadium !== undefined) {
                matchState.stadium = data.stadium;
            }
            if (data.language !== undefined) {
                const oldLang = matchState.language;
                matchState.language = data.language;
                if (oldLang !== data.language) {
                    applyTranslations();
                }
            }
            if (data.showOverlay !== undefined) {
                matchState.visible = data.showOverlay;
                if (matchState.visible) {
                    showOverlay();
                } else {
                    hideOverlay();
                }
            }
            if (data.activeAnimation !== undefined) {
                matchState.activeAnimation = data.activeAnimation;
            }

            updateDisplay();
        };

        // Socket listeners
        socket.on('pokemon-match-update', handleMatchUpdate);
        socket.on('pokemon-match-state', handleMatchUpdate);

        socket.on('stadium-update', (data) => {
            matchState.stadium = data.stadium;
            updateStadiumDisplay();
        });

        socket.on('record-update', (data) => {
            const player = `player${data.player}`;
            matchState[player].record = data.record;
            updatePlayerInfo(data.player);
        });

        socket.on('match-score-update', (data) => {
            const player = `player${data.player}`;
            matchState[player].matchScore = data.score;
            updatePlayerInfo(data.player);
        });

        socket.on('turn-actions-update', (data) => {
            const player = `player${data.player}`;
            matchState[player].turnActions = data.actions;
            updateTurnActions(data.player);
        });

        socket.on('turn-actions-reset', () => {
            matchState.player1.turnActions = { energy: false, supporter: false, retreat: false };
            matchState.player2.turnActions = { energy: false, supporter: false, retreat: false };
            updateTurnActions(1);
            updateTurnActions(2);
        });

        socket.on('bench-size-update', (data) => {
            const player = `player${data.player}`;
            matchState[player].benchSize = data.size;
            updateBenchDisplay(data.player);
        });

        socket.on('active-pokemon', (data) => {
            const player = `player${data.player}`;
            matchState[player].active = data.pokemon;
            updateActiveDisplay(data.player);
        });

        socket.on('bench-update', (data) => {
            const player = `player${data.player}`;
            matchState[player].bench = data.bench;
            updateBenchDisplay(data.player);
        });

        socket.on('pokemon-evolved', (data) => {
            setTimeout(() => {
                triggerEvolutionAnimation(data.player, data.slot, data.benchIndex);
            }, 50);
        });

        socket.on('prize-taken', (data) => {
            const player = `player${data.player}`;
            if (!matchState[player].prizesTaken.includes(data.index)) {
                matchState[player].prizesTaken.push(data.index);
                matchState[player].prizes = 6 - matchState[player].prizesTaken.length;
            }
            renderPrizes(data.player);
            updatePlayerInfo(data.player);
        });

        socket.on('prizes-reset', () => {
            matchState.player1.prizesTaken = [];
            matchState.player1.prizes = 6;
            matchState.player2.prizesTaken = [];
            matchState.player2.prizes = 6;
            renderPrizes(1);
            renderPrizes(2);
            updatePlayerInfo(1);
            updatePlayerInfo(2);
        });

        socket.on('turn-switch', (data) => {
            matchState.currentTurn = data.turn;
            updateDisplay();
        });

        socket.on('timer-start', () => {
            startTimer();
        });

        socket.on('timer-pause', () => {
            pauseTimer();
        });

        socket.on('timer-set', (data) => {
            matchState.timer.minutes = data.minutes;
            matchState.timer.seconds = data.seconds;
            updateMatchTimer();
        });

        socket.on('timer-tick', (data) => {
            matchState.timer.minutes = data.minutes;
            matchState.timer.seconds = data.seconds;
            updateMatchTimer();
        });

        socket.on('timer-reset', (data) => {
            pauseTimer();
            if (data) {
                matchState.timer.minutes = data.minutes;
                matchState.timer.seconds = data.seconds;
            } else {
                matchState.timer.minutes = 50;
                matchState.timer.seconds = 0;
            }
            updateMatchTimer();
        });

        socket.on('match-reset', () => {
            pauseTimer();
            matchState.player1.active = null;
            matchState.player1.bench = [];
            matchState.player1.prizes = 6;
            matchState.player1.prizesTaken = [];
            matchState.player1.matchScore = 0;
            matchState.player1.turnActions = { energy: false, supporter: false, retreat: false };
            
            matchState.player2.active = null;
            matchState.player2.bench = [];
            matchState.player2.prizes = 6;
            matchState.player2.prizesTaken = [];
            matchState.player2.matchScore = 0;
            matchState.player2.turnActions = { energy: false, supporter: false, retreat: false };

            matchState.stadium = '';
            matchState.currentTurn = 1;
            matchState.timer = { minutes: 50, seconds: 0 };
            
            updateDisplay();
        });

        socket.on('match-settings', (data) => {
            if (data.format) matchState.matchFormat = data.format;
            if (data.game) matchState.gameNumber = data.game;
            updateMatchInfo();
        });

        socket.on('toggle-pokemon-match', (data) => {
            matchState.visible = data.show;
            if (matchState.visible) {
                showOverlay();
            } else {
                hideOverlay();
            }
        });

        let timerInterval = null;
        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                if (matchState.timer.seconds > 0) {
                    matchState.timer.seconds--;
                } else if (matchState.timer.minutes > 0) {
                    matchState.timer.minutes--;
                    matchState.timer.seconds = 59;
                } else {
                    pauseTimer();
                }
                updateMatchTimer();
            }, 1000);
        }

        function pauseTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // Initialize connection
        socket.on('connect', () => {
            console.log('Connected to server, registering broadcast overlay...');
            socket.emit('register-overlay', 'pokemon-match-broadcast');

            setTimeout(() => {
                socket.emit('request-state', 'pokemon-match-broadcast');
            }, 500);
        });

        // Initial setup on load
        (async () => {
            await fetchTranslations();
            applyTranslations();
        })();
    </script>
</body>
</html>
